version: 2
updates:
  # One pip ecosystem entry per service -- each has its own requirements.txt
  # (the microservice split, ADR 004, means no single shared dependency file).
  - package-ecosystem: pip
    directory: /services/ws1-collectors
    schedule: { interval: weekly }
  - package-ecosystem: pip
    directory: /services/ws2-normalization
    schedule: { interval: weekly }
  - package-ecosystem: pip
    directory: /services/ws3-indexer
    schedule: { interval: weekly }
  - package-ecosystem: pip
    directory: /services/ws4-detection
    schedule: { interval: weekly }
  - package-ecosystem: pip
    directory: /services/ws5-ai
    schedule: { interval: weekly }
  - package-ecosystem: pip
    directory: /services/ws6-inventory
    schedule: { interval: weekly }
  # devkit-feeder and ws7-dashboard have no requirements.txt (feeder installs
  # its one dependency inline in the Dockerfile; dashboard is static+nginx) --
  # no pip ecosystem entry for either, only docker (below).

  # GitHub Actions used in workflows (ci.yml, fuzz.yml, codeql.yml, release.yml,
  # scorecard.yml) -- pinning these matters for the same supply-chain-integrity
  # reason pinning Python deps does.
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }

  # Base images in every service Dockerfile + infra/docker-compose.yml.
  - package-ecosystem: docker
    directory: /services/ws1-collectors
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /services/ws2-normalization
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /services/ws3-indexer
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /services/ws4-detection
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /services/ws5-ai
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /services/ws6-inventory
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /services/ws7-dashboard
    schedule: { interval: weekly }
  - package-ecosystem: docker
    directory: /services/devkit-feeder
    schedule: { interval: weekly }
