name: CodeQL

# M2 supply-chain trust signal (PLAN_C Tier 2.2). Static analysis for
# security vulnerabilities across the Python codebase.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "42 4 * * 1"  # weekly, Monday 04:42 UTC

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
