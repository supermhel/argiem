name: OpenSSF Scorecard

# M2 supply-chain trust signal (PLAN_C Tier 2.2). Publishes the Scorecard
# badge referenced in README.md -- score is measured by this job, not
# claimed; the badge reads "unknown" until this runs at least once on `main`.
on:
  branch_protection_rule: {}
  schedule:
    - cron: "23 5 * * 3"  # weekly, Wednesday 05:23 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # to upload SARIF results
      id-token: write          # to publish results and get a badge (publish_results: true)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      # Pinned to an exact tag: ossf/scorecard-action publishes no floating
      # `v2` major tag (unlike actions/*), so `@v2` fails to resolve at all.
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v3
        with:
          sarif_file: results.sarif
