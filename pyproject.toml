[tool.ruff]
line-length = 135
target-version = "py311"
extend-exclude = ["services/*/mocks", "fixtures"]

[tool.ruff.lint]
# Default rule set (E/F) plus nothing exotic -- this is a lint FLOOR (M2, PLAN_C
# Tier 2.3), not a style rewrite. Landed 2026-07-16 at zero errors; keep it there.
select = ["E", "F"]
ignore = [
    # E702 (multiple statements via semicolon): an established idiom across this
    # codebase's test files (`finally: srv.shutdown(); srv.server_close()`), not
    # sloppiness. 23 instances existed when this gate landed -- rewriting them
    # all would be pure style churn against a working, reviewed test suite for
    # zero functional benefit. New code should still prefer one statement per
    # line; this is a floor, not encouragement.
    "E702",
]

[tool.black]
line-length = 135
target-version = ["py311"]
extend-exclude = '''
/(
  services/.*/mocks
  | fixtures
)/
'''
# NOT applied repo-wide yet, deliberately (M2, PLAN_C Tier 2.3): `black --check`
# flags 98 of 100 files at landing time (2026-07-16) -- this codebase has its
# own established compact style (dense one-liners, e.g. `finally:
# srv.shutdown(); srv.server_close()`) that predates this config. Applying
# black now would be a 98-file mechanical reformat with zero functional
# change bundled into whatever PR happened to add this file -- exactly the
# "no unrelated refactors bundled in" violation CONTRIBUTING.md's own PR
# checklist calls out. Configured + wired into pre-commit so *new* code is
# black-formatted going forward; a full-repo reformat is a separate,
# deliberate, owner-approved PR (it's large enough to warrant its own review,
# same spirit as the standing "ask before adding heavyweight dependencies"
# guardrail even though a formatter isn't literally a dependency).

[tool.mypy]
python_version = "3.11"
# M2 gate CLOSED (2026-07-22): re-measured the 2026-07-16 baseline before
# trusting it (the "20 findings" comment above had drifted -- a live re-run
# found 47 across all 8 workstreams, not 20, since new v0.5 parsers/tests had
# landed since the comment was written). All 47 fixed with narrow, behavior-
# preserving changes (Optional-narrowing, explicit dict/str casts on parser
# fields, two `# type: ignore` comments on genuinely platform-guarded code --
# tools/fengarde_bench.py's Windows-vs-POSIX `resource` fallback and a test
# double that intentionally violates the Parser protocol). Verified via
# `mypy services/wsN-x --explicit-package-bases --ignore-missing-imports` per
# workstream (0 errors, all 8) + a full `run_all_tests.sh` pass (no behavior
# changed). CI's mypy step (.github/workflows/ci.yml) is now BLOCKING, not
# informational -- the `|| true` suffix was removed once every workstream hit
# zero. Regressions fail CI the same way ruff/coverage already do.
ignore_missing_imports = true
exclude = ["services/.*/mocks", "fixtures"]

[tool.mutmut]
# M2, PLAN_C Tier 2.3: mutation-testing gate, deliberately scoped narrow for
# its FIRST pass rather than repo-wide (mutmut requires no prior footprint
# here -- this is the honest starting baseline, not a target). Native Windows
# mutmut isn't supported (upstream issue #397); run under WSL:
#   wsl -e bash -lc "cd '<repo>' && python3 -m mutmut run"
# Scope: services/shared/sessions.py only -- smallest, mypy-clean (see
# [tool.mypy] above), highest security-relevance module in services/shared
# (session tokens/CSRF/expiry -- a security boundary, per its own module
# docstring). Each mutant re-runs the test command below, so scoping to one
# file (not all 12 zero-infra test scripts in services/shared) keeps a single
# `mutmut run` bounded to minutes, not hours, in this environment.
# Informational in CI for now (see .github/workflows/ci.yml) -- same "measure
# first, gate later" sequencing mypy went through, so a real number lands
# before any pass/fail threshold is chosen.
source_paths = ["services/shared/sessions.py"]
do_not_mutate = ["*test_*.py"]
pytest_add_cli_args_test_selection = ["tools/test_mutmut_shared.py"]
also_copy = ["tools"]

[tool.coverage.run]
branch = true
source = ["services"]
omit = [
    "*/test_*.py",
    "*/mocks/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
# Coverage gate target is WS-2/WS-3 core (M2, PLAN_C Tier 2.3, ~85%) -- not
# enforced repo-wide yet. See the M2 commit for the measured baseline.
show_missing = true
skip_empty = true
