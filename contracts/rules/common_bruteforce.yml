title: Authentication brute-force from single source
id: 6f1c8a2e-0d3b-4c11-9a21-7b5e2f9a1c01
status: stable
description: >
  10+ failed authentications from the same source IP within 60 seconds.
  Works for any source mapped to OCSF Authentication (AD, LDAP, RADIUS, SSH).
level: high
logsource:
  category: authentication
detection:
  # NOTE: intentionally fires on ALL sources, internal included -- a compromised
  # internal host brute-forcing is a real threat and must not be suppressed by
  # default. If a shared NAT/proxy egress produces benign bursts at your site,
  # add a suppression here yourself, e.g.:
  #     src_endpoint.ip: {not_in: corp_ranges}
  # (or a dedicated known-egress allowlist) -- but understand it blinds this rule
  # to attacks from those ranges.
  failed_auth:
    class_uid: 3002
    activity_id: 4
  condition: failed_auth
fields:
  - src_endpoint.ip
  - actor.user.name
siem:
  sector: common
  score_weight: 70
  window_seconds: 60
  threshold: 10
  group_by: src_endpoint.ip
