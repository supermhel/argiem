# Service-account allowlist (v0.4, A3): account names that routinely perform
# privileged/administrative actions off-hours (backup, patching, orchestration,
# monitoring agents) and should NOT trip common_after_hours_admin.yml.
#
# Windows EventID 4672 ("special privileges assigned to new logon") fires on
# nearly every admin AND service-account logon, so an off-hours rule that keys
# only on 4672 floods with routine automation. List your service accounts here to
# silence them while keeping the signal for interactive/human admin logons.
#
# Matches by EXACT string on actor.user.name (these are account names, not CIDRs).
# Shipped EMPTY on purpose: with no entries nothing is suppressed, so the rule
# behaves exactly as before until you populate it -- no silent detection change.
#
#   entries:
#     - "svc_backup"
#     - "DOMAIN\\svc_sccm"
#     - "monitoring-agent"
entries: []
